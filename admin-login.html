<!doctype html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>X Mobile - Вход в админ-панель</title>
  <meta name="description" content="Вход в админ-панель X Mobile для управления контентом, FAQ и товарами.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&family=Sora:wght@600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="./styles.css">
</head>
<body>
  <header class="topbar">
    <div class="topbar__inner">
      <a class="logo" href="./index.html"><img class="logo__img" src="./assets/logo-xmobile.svg" alt="X Mobile"></a>
      <nav class="nav">
        <a href="./index.html">Главная</a>
        <a href="./shop.html">Магазин</a>
        <a href="./admin-login.html" class="is-active">Админ вход</a>
      </nav>
      <a class="btn btn--dark" href="./index.html#calculator">Оставить заявку</a>
    </div>
  </header>

  <main>
    <section class="section admin-login-wrap reveal">
      <article class="admin-login-card">
        <h1>Вход в админ-панель</h1>
        <p>Доступ только для администратора. Здесь можно редактировать тексты сайта, FAQ и каталог товаров.</p>

        <form id="adminLoginForm" class="admin-login-form" autocomplete="off">
          <label>
            Логин
            <input id="adminLogin" type="text" placeholder="Введите логин" required>
          </label>
          <label>
            Пароль
            <input id="adminPassword" type="password" placeholder="Введите пароль" required>
          </label>
          <button class="btn btn--orange" type="submit">Войти</button>
        </form>

        <p class="admin-note" id="adminLoginNote">Авторизация требуется для доступа к `/admin.html`.</p>
      </article>
    </section>
  </main>

  <script src="./script.js"></script>
  <script src="./admin.js"></script>
</body>
</html>
